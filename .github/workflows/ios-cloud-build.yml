name: iOS Cloud Build

on:
  push:
    paths:
      - "ios/MatrixMess/**"
      - ".github/workflows/ios-cloud-build.yml"
      - "codemagic.yaml"
  pull_request:
    paths:
      - "ios/MatrixMess/**"
      - ".github/workflows/ios-cloud-build.yml"
      - "codemagic.yaml"
  workflow_dispatch:

jobs:
  validate-simulator:
    name: Validate iOS Simulator Build
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
        working-directory: ios/MatrixMess

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project MatrixMess.xcodeproj \
            -scheme MatrixMess \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee simulator-build.log

      - name: Upload Simulator Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: ios/MatrixMess/simulator-build.log
          if-no-files-found: ignore

  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs:
      - validate-simulator
    defaults:
      run:
        shell: bash
        working-directory: ios/MatrixMess

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Build Unsigned IPA
        run: |
          set -o pipefail
          sh scripts/build-unsigned-ipa.sh | tee unsigned-ipa-build.log

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatrixMess-unsigned-ipa
          path: ios/MatrixMess/build/export/MatrixMess-unsigned.ipa
          if-no-files-found: error

      - name: Upload Unsigned IPA Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-build-log
          path: ios/MatrixMess/unsigned-ipa-build.log
          if-no-files-found: ignore
